[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",  # LLD: linker más rápido, mejor dead-code elimination
    "-C", "target-cpu=x86-64",       # Baseline x86-64: compatible con cualquier CPU de 64 bits
    "-C", "link-arg=-Wl,--as-needed", # Solo linkea libs que realmente se usan (reduce tamaño y startup)
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-cpu=generic",
    "-C", "link-arg=-Wl,--as-needed",
]
